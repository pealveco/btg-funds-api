server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: ${SPRING_APPLICATION_NAME:BtgPactualFundsApi}
  devtools:
    add-properties: false
  profiles:
    include: ${SPRING_PROFILES_INCLUDE:}
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
aws:
  region: ${AWS_REGION}
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:}
  sns:
    topic-arn: ${NOTIFICATIONS_TOPIC_ARN}
adapters:
  dynamodb:
    tables:
      clients: ${CLIENTS_TABLE}
      funds: ${FUNDS_TABLE}
      subscriptions: ${SUBSCRIPTIONS_TABLE}
      transactions: ${TRANSACTIONS_TABLE}
cors:
  allowed-origins: http://localhost:4200,http://localhost:8080
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{correlationId}] %logger{36} - %msg%n"
